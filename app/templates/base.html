<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Inferência Estatística{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & TOKENS ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0e14;
      --surface:   #111520;
      --surface2:  #181d2b;
      --border:    #1f2740;
      --accent:    #3d7fff;
      --accent2:   #00d4aa;
      --reject:    #ff4f6d;
      --norej:     #00d4aa;
      --text:      #d0d8f0;
      --muted:     #5a6380;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.65;
      min-height: 100vh;
    }

    /* ── GRID BACKGROUND ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .35;
    }

    /* ── NAV ────────────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,14,20,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; gap: 2rem;
      height: 56px;
    }
    .nav-brand {
      font-family: var(--mono); font-size: .8rem; font-weight: 600;
      color: var(--accent); letter-spacing: .12em; text-transform: uppercase;
      text-decoration: none;
      display: flex; align-items: center; gap: .5rem;
    }
    .nav-brand span { color: var(--accent2); }
    nav a {
      font-family: var(--mono); font-size: .75rem; color: var(--muted);
      text-decoration: none; letter-spacing: .06em;
      padding: .25rem .5rem; border-radius: 4px;
      transition: color .2s, background .2s;
    }
    nav a:hover, nav a.active {
      color: var(--text); background: var(--surface2);
    }
    .nav-tag {
      margin-left: auto;
      font-family: var(--mono); font-size: .7rem; color: var(--muted);
      border: 1px solid var(--border); padding: .2rem .6rem; border-radius: 20px;
    }

    /* ── WRAPPER ────────────────────────────────────────── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── PAGE HEADER ────────────────────────────────────── */
    .page-header { margin-bottom: 2.5rem; }
    .page-tag {
      font-family: var(--mono); font-size: .7rem; color: var(--accent2);
      letter-spacing: .15em; text-transform: uppercase;
      margin-bottom: .5rem;
    }
    h1 {
      font-size: 2rem; font-weight: 600; line-height: 1.2;
      color: #e8eeff;
    }
    h1 em { font-style: normal; color: var(--accent); }
    .page-sub {
      margin-top: .6rem; color: var(--muted); font-size: .9rem;
    }

    /* ── CARD ───────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-family: var(--mono); font-size: .75rem; font-weight: 600;
      color: var(--accent); letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .card-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── FORM ELEMENTS ──────────────────────────────────── */
    label {
      display: block; font-size: .8rem; color: var(--muted);
      font-family: var(--mono); letter-spacing: .06em;
      margin-bottom: .4rem;
    }
    input[type=text], input[type=number], textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono); font-size: .85rem;
      padding: .6rem .85rem;
      outline: none;
      transition: border-color .2s;
    }
    input[type=text]:focus, input[type=number]:focus,
    textarea:focus, select:focus {
      border-color: var(--accent);
    }
    textarea { resize: vertical; min-height: 90px; }

    .form-row { display: grid; gap: 1rem; }
    .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .field { margin-bottom: 1rem; }
    .field-hint {
      font-size: .75rem; color: var(--muted); margin-top: .35rem;
    }

    /* radio */
    .radio-group { display: flex; gap: 1rem; margin-top: .25rem; }
    .radio-group label {
      display: flex; align-items: center; gap: .4rem;
      font-size: .82rem; cursor: pointer; color: var(--text);
      margin-bottom: 0;
    }
    input[type=radio] { accent-color: var(--accent); }

    /* ── BUTTON ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: 6px;
      padding: .65rem 1.5rem;
      font-family: var(--mono); font-size: .8rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    /* ── RESULTADO ──────────────────────────────────────── */
    .result-banner {
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid;
      display: flex; align-items: center; gap: 1rem;
    }
    .result-banner.rejeita {
      background: rgba(255,79,109,.08); border-color: var(--reject);
    }
    .result-banner.nao-rejeita {
      background: rgba(0,212,170,.08); border-color: var(--norej);
    }
    .banner-icon { font-size: 1.6rem; }
    .banner-label {
      font-family: var(--mono); font-size: .7rem;
      text-transform: uppercase; letter-spacing: .12em;
      opacity: .7; margin-bottom: .15rem;
    }
    .banner-title { font-size: 1.1rem; font-weight: 600; }
    .rejeita .banner-title  { color: var(--reject); }
    .nao-rejeita .banner-title { color: var(--norej); }

    /* Stat pills */
    .stats-row {
      display: flex; flex-wrap: wrap; gap: .75rem;
      margin-bottom: 1.5rem;
    }
    .stat-pill {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: .7rem 1.1rem;
      flex: 1; min-width: 130px;
    }
    .stat-pill .pill-label {
      font-family: var(--mono); font-size: .65rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em;
    }
    .stat-pill .pill-value {
      font-family: var(--mono); font-size: 1.05rem;
      font-weight: 600; color: var(--accent); margin-top: .15rem;
    }

    /* Tabelas de resultado */
    .tbl-wrap { overflow-x: auto; margin-bottom: 1rem; }
    table {
      width: 100%; border-collapse: collapse;
      font-family: var(--mono); font-size: .8rem;
    }
    th {
      background: var(--surface2); color: var(--muted);
      font-weight: 500; letter-spacing: .07em;
      padding: .55rem .75rem; text-align: right;
      border-bottom: 1px solid var(--border);
    }
    th:first-child { text-align: left; }
    td {
      padding: .5rem .75rem; text-align: right;
      border-bottom: 1px solid rgba(31,39,64,.6);
      color: var(--text);
    }
    td:first-child { text-align: left; color: var(--muted); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(61,127,255,.04); }

    /* ── ERRO ───────────────────────────────────────────── */
    .alert-error {
      background: rgba(255,79,109,.1); border: 1px solid var(--reject);
      border-radius: 6px; padding: .85rem 1rem;
      font-family: var(--mono); font-size: .82rem; color: var(--reject);
      margin-bottom: 1rem;
    }

    /* ── INDEX CARDS ────────────────────────────────────── */
    .test-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
    }
    .test-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.5rem;
      text-decoration: none; color: var(--text);
      transition: border-color .2s, transform .2s, box-shadow .2s;
      display: block;
    }
    .test-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(61,127,255,.15);
    }
    .test-card .tc-num {
      font-family: var(--mono); font-size: .7rem; color: var(--accent2);
      letter-spacing: .12em; margin-bottom: .75rem;
    }
    .test-card h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: .5rem; }
    .test-card p  { font-size: .82rem; color: var(--muted); line-height: 1.55; }
    .test-card .tc-formula {
      margin-top: 1.1rem; padding-top: .9rem; border-top: 1px solid var(--border);
      font-family: var(--mono); font-size: .78rem; color: var(--accent);
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .form-row.cols-2, .form-row.cols-3 { grid-template-columns: 1fr; }
      nav { gap: .75rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">χ²<span>stat</span></a>
  <a href="/aderencia"    {% if request.path == '/aderencia'    %}class="active"{% endif %}>Aderência</a>
  <a href="/independencia"{% if request.path == '/independencia'%}class="active"{% endif %}>Independência</a>
  <a href="/homogeneidade"{% if request.path == '/homogeneidade'%}class="active"{% endif %}>Homogeneidade</a>
  <a href="/exemplos" {% if request.path == '/exemplos' %}class="active"{% endif %}>Exemplos PDF</a>
  <span class="nav-tag">Qui-Quadrado</span>
</nav>

<div class="wrapper">
  {% block content %}{% endblock %}
</div>

</body>
</html>
